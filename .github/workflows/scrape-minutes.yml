name: Scrape Meeting Minutes

on:
  schedule:
    # Run every Monday at 9:00 AM UTC (4:00 AM EDT)
    - cron: '0 9 * * 1'
  workflow_dispatch:  # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    env:
      POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v2
      
      - name: Install dependencies
        run: |
          cd scripts
          uv sync
      
      - name: Scrape meeting minutes
        run: |
          cd scripts
          uv run scrape_minutes.py
      
      - name: Trigger ISR revalidation
        if: success()
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{"tags":["council-votes"]}' \
            "https://ajax-in-plain-sight.vercel.app/api/webhook/revalidate?token=${{ secrets.ISR_REVALIDATION_TOKEN }}"
      
      - name: Log scrape completion
        if: always()
        run: echo "[v0] Scrape job completed at $(date)"
