name: Parse Form 4 Documents (Manual)

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  parse:
    runs-on: ubuntu-latest
    
    env:
      POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v2
      
      - name: Install dependencies
        run: |
          cd scripts
          uv sync
      
      - name: Parse Form 4 documents
        run: |
          cd scripts
          uv run parse_form_4.py
      
      - name: Trigger ISR revalidation
        if: success()
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{"tags":["council-donors"]}' \
            "https://ajax-in-plain-sight.vercel.app/api/webhook/revalidate?token=${{ secrets.ISR_REVALIDATION_TOKEN }}"
      
      - name: Log completion
        if: always()
        run: echo "[v0] Form 4 parsing completed at $(date)"
